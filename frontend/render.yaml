services:
  - type: web
    name: altitude-bpo-frontend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: VITE_API_URL
        value: https://altitude-backend-odjz.onrender.com/api
      - key: NODE_VERSION
        value: 18.18.0